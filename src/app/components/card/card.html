<div class="card-content">
    <div class="card-labels" *ngIf="card.labels && card.labels.length > 0">
        <span class="label" *ngFor="let label of card.labels" [style.background-color]="label"></span>
    </div>
    <div class="card-title">{{ card.title }}</div>
    <div class="card-description" *ngIf="card.description">
        {{ card.description }}
    </div>
</div>
